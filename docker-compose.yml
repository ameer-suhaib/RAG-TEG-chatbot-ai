services:

  api:
    build: .
    container_name: teg-rag-api

    ports:
      - "8001:8001"

    volumes:
      - .:/app

    env_file:
      - .env

    depends_on:
      - qdrant

    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest

    container_name: teg-qdrant

    ports:
      - "6333:6333"
      - "6334:6334"

    volumes:
      - qdrant_data:/qdrant/storage

    restart: unless-stopped

volumes:
  qdrant_data: